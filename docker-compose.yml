services:
  mysql:
    image: mysql:8.4
    container_name: buildingfex-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: buildingfex
    ports:
      - "3306:3306"
    volumes:
      - buildingfex_mysql_data:/var/lib/mysql

volumes:
  buildingfex_mysql_data:
